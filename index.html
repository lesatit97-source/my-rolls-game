<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой Инвентарь</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #0088cc;
            margin-bottom: 20px;
        }

        #inventory-list {
            width: 100%;
            max-width: 400px;
        }

        .gift-card {
            background: #2b2b2b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #3d3d3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .gift-info {
            font-size: 16px;
            font-weight: bold;
        }

        button {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:active {
            background-color: #005580;
        }

        .empty-msg {
            color: #888;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h2>🎁 Мои Подарки</h2>
    
    <div id="inventory-list">
        <p class="empty-msg">Загрузка инвентаря...</p>
    </div>

    <script>
        // Инициализация Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        // Получаем ID пользователя из Telegram
        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id : null;

        async function loadInventory() {
            const listElement = document.getElementById('inventory-list');
            
            if (!userId) {
                listElement.innerHTML = '<p class="empty-msg">Ошибка: ID пользователя не найден</p>';
                return;
            }

            try {
                // Запрос к нашему API в main.py
                const response = await fetch(`/api/my_gifts?user_id=${userId}`);
                const gifts = await response.json();

                if (gifts.length === 0) {
                    listElement.innerHTML = '<p class="empty-msg">У вас пока нет доступных подарков</p>';
                } else {
                    listElement.innerHTML = gifts.map(gift => `
                        <div class="gift-card">
                            <div class="gift-info">🎁 NFT Gift #${gift.id}</div>
                            <button onclick="withdraw(${gift.id})">Вывести</button>
                        </div>
                    `).join('');
                }
            } catch (error) {
                listElement.innerHTML = '<p class="empty-msg">Ошибка загрузки данных</p>';
            }
        }

        function withdraw(giftId) {
            tg.showConfirm(`Вы хотите вывести подарок #${giftId}?`, (ok) => {
                if (ok) {
                    tg.showAlert("Запрос отправлен! Ожидайте обработки.");
                    // Здесь можно добавить fetch на сервер для смены статуса на 'withdrawn'
                }
            });
        }

        // Запускаем загрузку при открытии страницы
        loadInventory();
    </script>
</body>
</html>
